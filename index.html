<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCPA Scoring Database</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="site-title-group">
                <span class="site-title"><span class="site-title-scpa">scpa</span><strong class="site-title-db">db</strong></span>
                <span class="site-title-byline">presented by GAN</span>
            </div>
        </div>
    </header>

    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="leaderboard">Leaderboard</button>
        <button class="tab-btn" data-tab="show-records">Recaps by Show</button>
        <button class="tab-btn" data-tab="ensemble">Ensembles</button>
        <button class="tab-btn" data-tab="judges" hidden>Judge Statistics</button>
        <button class="tab-btn" data-tab="sql" hidden>SQL Query</button>
    </nav>

    <div id="status-bar" class="status-bar">Loading database&hellip;</div>

    <main id="app" hidden>

        <!-- ===== Season Leaderboard ===== -->
        <div id="tab-leaderboard" class="tab-panel">
            <div class="controls">
                <div class="control-group">
                    <label>Season</label>
                    <div id="lb-season-buttons" class="season-buttons"></div>
                </div>
            </div>
            <div id="lb-content"></div>
        </div>

        <!-- ===== Show Records ===== -->
        <div id="tab-show-records" class="tab-panel" hidden>
            <div class="controls">
                <div class="control-group">
                    <label>Season</label>
                    <div id="sr-season-buttons" class="season-buttons"></div>
                </div>
                <div class="control-group">
                    <label for="sr-date">Show Day</label>
                    <select id="sr-date"><option value="">— select season first —</option></select>
                </div>
                <div class="control-group control-toggle">
                    <label class="toggle-label">
                        <input type="checkbox" id="sr-combine">
                        Combine same-class blocks
                    </label>
                </div>
                <div class="control-group control-toggle">
                    <label class="toggle-label">
                        <input type="checkbox" id="sr-detail">
                        Detailed scores
                    </label>
                </div>
            </div>
            <div id="sr-content"></div>
        </div>

        <!-- ===== Ensemble View ===== -->
        <div id="tab-ensemble" class="tab-panel" hidden>
            <div class="controls">
                <div class="control-group" style="position:relative">
                    <label for="ens-search">Ensemble</label>
                    <input type="text" id="ens-search" placeholder="Search ensembles&hellip;" autocomplete="off">
                    <ul id="ens-dropdown" class="dropdown" hidden></ul>
                </div>
                <div class="control-group" id="ens-class-group" hidden>
                    <label for="ens-class">Group</label>
                    <select id="ens-class" disabled>
                        <option value="">— select ensemble first —</option>
                    </select>
                    <div id="ens-class-note" class="control-note" hidden></div>
                </div>
            </div>
            <div id="ens-index-btn-group" hidden>
                <button type="button" id="ens-back-btn" class="secondary-button">&#8592; Index</button>
            </div>
            <div id="ens-index"></div>
            <div id="ens-content" hidden>
                <section class="ensemble-hero">
                    <h2 id="ens-title"></h2>
                    <div id="ens-subtitle"></div>
                    <div id="ens-error" class="inline-error" hidden></div>
                </section>
                <nav id="ens-jumps" class="ensemble-jumps"></nav>
                <section id="ens-stats-section" class="ens-section">
                    <h3>Stats</h3>
                    <div id="ens-stats"></div>
                </section>
                <section id="ens-trend-section" class="ens-section">
                    <h3>Score Trend</h3>
                    <div id="ens-chart"></div>
                </section>
                <section id="ens-improvement-section" class="ens-section">
                    <h3>Improvement Index</h3>
                    <div id="ens-improvement"></div>
                </section>
                <div id="ens-records-section">
                    <div id="ens-season-jumps-nav"></div>
                    <div class="ens-records-controls">
                        <label class="ens-detail-label">
                            <input type="checkbox" id="ens-detail">
                            <span>Detailed records</span>
                        </label>
                        <div class="ens-sort-control">
                            <button type="button" id="ens-sort-desc" class="sort-dir-btn active">Newest first</button>
                            <button type="button" id="ens-sort-asc" class="sort-dir-btn">Oldest first</button>
                        </div>
                    </div>
                    <div id="ens-season-details"></div>
                </div>
            </div>
        </div>

        <!-- ===== Judge Statistics ===== -->
        <div id="tab-judges" class="tab-panel" hidden>
            <div id="judge-content"></div>
        </div>

        <!-- ===== SQL Query ===== -->
        <div id="tab-sql" class="tab-panel" hidden>
            <div class="sql-layout">
                <section class="sql-editor">
                    <label for="sql-input">Advanced read-only SQL</label>
                    <textarea id="sql-input" spellcheck="false">SELECT * FROM performances LIMIT 10;</textarea>
                    <div class="sql-actions">
                        <button type="button" id="sql-run">Run</button>
                        <button type="button" id="sql-clear">Clear</button>
                    </div>
                    <div id="sql-message" class="inline-error" hidden></div>
                    <div id="sql-results"></div>
                </section>
                <aside id="sql-schema" class="sql-schema"></aside>
            </div>
        </div>

    </main>

    <script src="js/sql-wasm.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
